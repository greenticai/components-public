name: Publish Platform Extension

# Publishes greentic.platform-bootstrap (.gtxpack) on `platform-ext-v*`
# tag pushes. Tag pattern is distinct from `ext-v*` (http) so each
# extension in the repo can ship independently. Version published =
# tag name with the leading `platform-ext-v` stripped.

on:
  push:
    tags: ['platform-ext-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Extension version to publish (must match describe.json)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Derive version from tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#platform-ext-v}"
          fi
          echo "==> Publishing greentic.platform-bootstrap@${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - uses: greenticai/greentic-designer-extension-action@v2
        with:
          manifest: crates/platform-extension/Cargo.toml
          store-url: ${{ vars.GREENTIC_STORE_URL }}
          store-token: ${{ secrets.GREENTIC_STORE_TOKEN }}
          version: ${{ steps.ver.outputs.version }}
