name: Publish Platform Extension

# Publishes the greentic.platform-bootstrap design extension (.gtxpack)
# to the Greentic Store on `platform-ext-v*` tag pushes. Tag pattern is
# distinct from `ext-v*` (which the http extension uses) so each
# extension in this repo can be released independently.

on:
  push:
    tags: ['platform-ext-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Extension version to publish (must match describe.json)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      # Pre-flight publisher prefix check intentionally omitted — the
      # store API stopped returning `allowed_prefixes` on the publisher
      # endpoint, breaking ci/check_publisher_prefix.sh. The
      # designer-extension-action handles auth + prefix enforcement
      # store-side anyway.
      - name: Publish via designer-extension-action
        uses: greenticai/greentic-designer-extension-action@v2
        with:
          extension-dir: crates/platform-extension
          version-from-tag: ${{ github.event_name == 'push' }}
        env:
          GREENTIC_STORE_URL: ${{ vars.GREENTIC_STORE_URL }}
          GREENTIC_STORE_TOKEN: ${{ secrets.GREENTIC_STORE_TOKEN }}
