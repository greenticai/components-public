name: CI and Publish
on:
  workflow_call:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: greenticai/.github/.github/workflows/wasm-component-ci.yml@main
    with:
      wasm-build-args: "--target wasm32-wasip2"
      validate-component: false

  gtests:
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2
      - name: Restore cargo binaries cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bins-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bins-
      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
        with:
          version: "1.17.8"
      - name: Install Greentic CLIs
        run: |
          cargo binstall --no-confirm cargo-component
          cargo binstall --no-confirm greentic-pack greentic-flow greentic-integration-tester
      - name: Save cargo binaries cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-bins-${{ hashFiles('**/Cargo.lock') }}
      - name: Run README gtests
        run: greentic-integration-tester run --gtest tests/gtests/README --artifacts-dir artifacts/readme-gtests --errors
      - name: Upload gtest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: readme-gtest-artifacts
          path: artifacts/readme-gtests
          if-no-files-found: ignore

  publish-tools:
    runs-on: ubuntu-latest
    needs: [ci, gtests]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2
      - name: Restore cargo-component cache
        id: cargo-component-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/bin/cargo-component
            ~/.cargo/.crates2.json
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-component-0.21.1
      - name: Install cargo-component
        if: steps.cargo-component-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-component --locked --version 0.21.1
      - name: Save cargo-component cache
        if: steps.cargo-component-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            ~/.cargo/bin/cargo-component
            ~/.cargo/.crates2.json
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-component-0.21.1
      - name: Upload cargo-component binary
        uses: actions/upload-artifact@v4
        with:
          name: cargo-component-bin
          path: ~/.cargo/bin/cargo-component
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: [ci, gtests, publish-tools]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        component:
          - name: component-pack2flow
            artifact: component_pack2flow.wasm
          - name: component-http
            artifact: component_http.wasm
          - name: component-events2msg
            artifact: component_events2msg.wasm
          - name: component-msg2events
            artifact: component_msg2events.wasm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.94.0
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2
      - name: Download cargo-component binary
        uses: actions/download-artifact@v4
        with:
          name: cargo-component-bin
          path: ~/.cargo/bin
      - name: Add cargo bin to PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Ensure cargo-component is executable
        run: chmod +x ~/.cargo/bin/cargo-component
      - name: Install oras
        uses: oras-project/setup-oras@v1
      - name: Build wasm
        run: make -C crates/${{ matrix.component.name }} wasm
      - name: Resolve component version
        id: version
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name=="${{ matrix.component.name }}") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push wasm to GHCR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="ghcr.io/${OWNER}/component/${{ matrix.component.name }}"
          ARTIFACT="target/wasm32-wasip2/release/${{ matrix.component.artifact }}"
          if [ ! -f "${ARTIFACT}" ]; then
            ALT_ARTIFACT="crates/${{ matrix.component.name }}/target/wasm32-wasip2/release/${{ matrix.component.artifact }}"
            if [ -f "${ALT_ARTIFACT}" ]; then
              ARTIFACT="${ALT_ARTIFACT}"
            fi
          fi
          test -f "${ARTIFACT}"

          oras push "${REPO}:${VERSION}" \
            --artifact-type "application/wasm" \
            "${ARTIFACT}:application/wasm"

          oras push "${REPO}:latest" \
            --artifact-type "application/wasm" \
            "${ARTIFACT}:application/wasm"
