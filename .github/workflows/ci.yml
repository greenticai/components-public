name: CI and Publish

on:
  push:
    branches: ["master"]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy
          targets: wasm32-wasip2
      - name: Cargo fmt
        run: cargo fmt --all -- --check
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Cargo test
        run: cargo test --workspace --all-targets
      - name: Cargo check (wasm32-wasip2)
        run: cargo check --target wasm32-wasip2

  publish:
    runs-on: ubuntu-latest
    needs: [rust]
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        component:
          - name: component-pack2flow
            artifact: component_pack2flow.wasm
          - name: component-http
            artifact: component_http.wasm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          targets: wasm32-wasip2
      - name: Install cargo-component
        run: cargo install cargo-component --locked
      - name: Install oras
        uses: oras-project/setup-oras@v1
      - name: Build wasm
        run: make -C crates/${{ matrix.component.name }} wasm
      - name: Resolve component version
        id: version
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name=="${{ matrix.component.name }}") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push wasm to GHCR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO="ghcr.io/${OWNER}/component/${{ matrix.component.name }}"
          ARTIFACT="target/wasm32-wasip2/release/${{ matrix.component.artifact }}"
          if [ ! -f "${ARTIFACT}" ]; then
            ALT_ARTIFACT="crates/${{ matrix.component.name }}/target/wasm32-wasip2/release/${{ matrix.component.artifact }}"
            if [ -f "${ALT_ARTIFACT}" ]; then
              ARTIFACT="${ALT_ARTIFACT}"
            fi
          fi
          test -f "${ARTIFACT}"

          oras push "${REPO}:${VERSION}" \
            --artifact-type "application/wasm" \
            "${ARTIFACT}:application/wasm"

          oras push "${REPO}:latest" \
            --artifact-type "application/wasm" \
            "${ARTIFACT}:application/wasm"
