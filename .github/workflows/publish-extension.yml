name: Publish HTTP Extension

# Publishes the greentic.http design extension (.gtxpack) to the
# Greentic Store on `ext-v*` tag pushes. The version that gets
# published is the tag name with the leading `ext-v` stripped, so
# `ext-v0.1.2` → `greentic.http@0.1.2`.

on:
  push:
    tags: ['ext-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Extension version to publish (must match describe.json)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Derive version from tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#ext-v}"
          fi
          echo "==> Publishing greentic.http@${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - uses: greenticai/greentic-designer-extension-action@v2
        with:
          manifest: crates/http-extension/Cargo.toml
          store-url: ${{ vars.GREENTIC_STORE_URL }}
          store-token: ${{ secrets.GREENTIC_STORE_TOKEN }}
          version: ${{ steps.ver.outputs.version }}
