name: Publish HTTP Extension

on:
  push:
    tags: ['ext-v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Extension version to publish (must match describe.json)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      # Pre-flight publisher prefix check intentionally omitted — the
      # store API stopped returning `allowed_prefixes` on the publisher
      # endpoint, breaking ci/check_publisher_prefix.sh. The
      # designer-extension-action handles auth + prefix enforcement
      # store-side anyway, so the local check was always belt-and-
      # braces. Restore it once the store API exposes allowed_prefixes
      # again (or replace with a different sanity probe).
      - name: Publish via designer-extension-action
        uses: greenticai/greentic-designer-extension-action@v1
        with:
          extension-dir: crates/http-extension
          version-from-tag: ${{ github.event_name == 'push' }}
        env:
          GREENTIC_STORE_URL: ${{ vars.GREENTIC_STORE_URL }}
          GREENTIC_STORE_TOKEN: ${{ secrets.GREENTIC_STORE_TOKEN }}
